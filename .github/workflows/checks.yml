name: Fast checks

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install --no-self-update
      - name: Install cargo audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit

  check:
    runs-on: ubuntu-latest
    env:
      POSTGRESQL_VERSION: "=1.0.0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install --no-self-update
      - name: Prepare offline bundled archive fixture
        run: |
          target="$(rustc -vV | sed -n 's/^host: //p')"
          mkdir -p "$HOME/.theseus/postgresql"
          touch "$HOME/.theseus/postgresql/postgresql-1.0.0-${target}.tar.gz"
      - name: Check isolated crate configurations
        run: |
          cargo check --package postgresql_archive --all-targets
          cargo check --package postgresql_archive --no-default-features --all-targets
          cargo check --package postgresql_extensions --no-default-features
          cargo check --package postgresql_embedded --no-default-features --features bundled
      - name: Check the project
        run: |
          cargo check --workspace --all-targets --features blocking
          cargo check --workspace --all-targets --features bundled
          cargo check --workspace --all-targets --features indicatif
          cargo check --workspace --all-targets --features rustls
          cargo check --workspace --all-targets --features theseus
          cargo check --workspace --all-targets --features tokio
          cargo check --workspace --all-targets --features zonky
          cargo check --workspace --all-targets --all-features

  clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install --no-self-update --component clippy
      - name: Check lints
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          cargo clippy --all-targets --all-features --examples --tests

  deny:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install --no-self-update
      - name: Install cargo deny
        run: cargo install cargo-deny
      - name: Check licenses
        run: cargo deny check --allow duplicate

  doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install --no-self-update
      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --document-private-items --all-features

  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install --no-self-update --component rustfmt
      - name: Check formatting
        run: cargo fmt --all --check
